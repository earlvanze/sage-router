<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Sage Router GitHub Auth Setup</title>
  <style>
    :root{color-scheme:dark;--bg:#08110d;--panel:#0e1b15;--border:#274635;--text:#edfdf5;--muted:#a9c5b8;--brand:#8df0b2}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;padding:24px}
    main{width:min(720px,100%);border:1px solid var(--border);border-radius:8px;background:var(--panel);padding:28px}
    h1{font-size:clamp(28px,5vw,44px);line-height:1;margin:0 0 12px}
    p{color:var(--muted);margin:0 0 18px}
    code{color:var(--brand)}
    pre{overflow:auto;border:1px solid var(--border);border-radius:8px;background:#050807;padding:16px;color:#d9f8e6}
    button{min-height:42px;border:0;border-radius:8px;padding:0 16px;background:var(--brand);color:#03150c;font-weight:800;cursor:pointer}
    .actions{display:flex;gap:12px;flex-wrap:wrap}
    .label{display:block;margin:20px 0 8px;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
    .notice{border:1px solid var(--border);border-radius:8px;background:#08110d;padding:14px;margin:18px 0;color:var(--muted)}
    ol{color:var(--muted);padding-left:22px}
    li{margin:8px 0}
    .hidden{display:none}
  </style>
</head>
<body>
  <main>
    <h1>Finish GitHub auth setup</h1>
    <p id="status">Reading the temporary manifest code from the redirect URL.</p>
    <div id="next-steps" class="notice hidden"></div>
    <span id="code-label" class="label hidden">Manifest code</span>
    <pre id="manifest-code" class="hidden"></pre>
    <span id="command-label" class="label hidden">Run from the sage-router repo</span>
    <pre id="command" class="hidden"></pre>
    <div class="actions">
      <button id="copy-command" class="hidden" type="button">Copy command</button>
      <button id="copy-code" class="hidden" type="button">Copy code</button>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const status = document.getElementById('status');
    const command = document.getElementById('command');
    const manifestCode = document.getElementById('manifest-code');
    const copyCommand = document.getElementById('copy-command');
    const copyCode = document.getElementById('copy-code');
    const commandLabel = document.getElementById('command-label');
    const codeLabel = document.getElementById('code-label');
    const nextSteps = document.getElementById('next-steps');
    const shellQuote = (value) => `'${String(value).replaceAll("'", "'\"'\"'")}'`;
    const setCopy = (button, value, copiedText) => {
      button.addEventListener('click', async () => {
        await navigator.clipboard.writeText(value);
        const original = button.textContent;
        button.textContent = copiedText;
        window.setTimeout(() => { button.textContent = original; }, 1800);
      });
    };
    if (code) {
      const text = `cd /home/digit/Dropbox/Projects/sage-router
bash scripts/bootstrap_github_supabase_auth.sh ${shellQuote(window.location.href)}
scripts/check_sagerouter_launch_readiness.sh`;
      status.textContent = 'GitHub returned a temporary manifest code. Run the command below within one hour to exchange it for app credentials, preserve the one-time client secret locally, and enable GitHub login in Supabase.';
      nextSteps.innerHTML = '<strong>Keep this secure:</strong> the script loads your local Supabase management token from <code>/home/digit/.openclaw/.env</code> and saves the GitHub client secret to <code>/home/digit/.openclaw/sage-router-github-auth.env</code>; the browser only holds the short-lived GitHub manifest code. If the command reports that the manifest code is expired, rerun <code>SAGEROUTER_GITHUB_APP_LOCAL_CAPTURE=0 bash scripts/bootstrap_github_supabase_auth.sh</code> and approve the app again.';
      nextSteps.classList.remove('hidden');
      manifestCode.textContent = code;
      manifestCode.classList.remove('hidden');
      codeLabel.classList.remove('hidden');
      command.textContent = text;
      command.classList.remove('hidden');
      commandLabel.classList.remove('hidden');
      copyCommand.classList.remove('hidden');
      copyCode.classList.remove('hidden');
      setCopy(copyCommand, text, 'Command copied');
      setCopy(copyCode, code, 'Code copied');
    } else {
      status.textContent = 'No manifest code was found in this URL.';
      nextSteps.innerHTML = '<ol><li>From the sage-router repo, run <code>SAGEROUTER_GITHUB_APP_LOCAL_CAPTURE=0 bash scripts/bootstrap_github_supabase_auth.sh</code>.</li><li>Approve the GitHub App as the owner. GitHub will redirect back here with <code>?code=...</code>, and this page will show the exchange command.</li><li>The local script loads <code>/home/digit/.openclaw/.env</code> and preserves the app client secret in <code>/home/digit/.openclaw/sage-router-github-auth.env</code>.</li></ol>';
      nextSteps.classList.remove('hidden');
    }
  </script>
</body>
</html>
