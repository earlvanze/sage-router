<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sage Router GitHub App</title>
  <style>
    :root{color-scheme:dark;--bg:#08110d;--panel:#0e1b15;--border:#274635;--text:#edfdf5;--muted:#a9c5b8;--brand:#8df0b2}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;padding:24px}
    main{width:min(720px,100%);border:1px solid var(--border);border-radius:8px;background:var(--panel);padding:28px}
    h1{font-size:clamp(28px,5vw,44px);line-height:1;margin:0 0 12px}
    p{color:var(--muted);margin:0 0 18px}
    code{color:var(--brand)}
    pre{overflow:auto;border:1px solid var(--border);border-radius:8px;background:#050807;padding:16px;color:#d9f8e6}
    button{min-height:42px;border:0;border-radius:8px;padding:0 16px;background:var(--brand);color:#03150c;font-weight:800;cursor:pointer}
    .hidden{display:none}
  </style>
</head>
<body>
  <main>
    <h1>GitHub app created</h1>
    <p id="status">Reading the temporary manifest code from the redirect URL.</p>
    <pre id="command" class="hidden"></pre>
    <button id="copy" class="hidden" type="button">Copy command</button>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const status = document.getElementById('status');
    const command = document.getElementById('command');
    const copy = document.getElementById('copy');
    if (code) {
      const text = `SAGEROUTER_GITHUB_APP_MANIFEST_CODE=${code} scripts/bootstrap_github_supabase_auth.sh`;
      status.textContent = 'Run this from the sage-router repo within one hour to exchange the code and enable GitHub login in Supabase.';
      command.textContent = text;
      command.classList.remove('hidden');
      copy.classList.remove('hidden');
      copy.addEventListener('click', async () => navigator.clipboard.writeText(text));
    } else {
      status.textContent = 'No manifest code was found in this URL.';
    }
  </script>
</body>
</html>
