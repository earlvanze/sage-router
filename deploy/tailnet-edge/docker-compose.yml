services:
  sage-router-tailnet-edge:
    build: .
    image: sage-router-tailnet-edge:latest
    container_name: sage-router-tailnet-edge
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/edge/health' % os.environ.get('SAGE_ROUTER_EDGE_PORT', '8790'), timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
