      <text x="24" y="13" font-size="14" font-weight="500" fill="#ffffff">openrouter</text>
      <text x="200" y="13" font-size="12" fill="#8888aa">openai-completions</text>
      <text x="500" y="13" font-size="12" fill="#00e5ff">342 models · free tier preferred</text>
    </g>
    <line x1="56" y1="552" x2="788" y2="552" stroke="#2d1b69" stroke-width="1"/>

    <g transform="translate(56, 570)">
      <circle cx="8" cy="8" r="5" fill="#00ffa3"/>
      <text x="24" y="13" font-size="14" font-weight="500" fill="#ffffff">ollama-cloud</text>
      <text x="200" y="13" font-size="12" fill="#8888aa">ollama</text>
      <text x="500" y="13" font-size="12" fill="#00e5ff">21 cloud models · kimi-k2.5, qwen3.5, cogito-2.1, devstral-2</text>
    </g>
    <line x1="56" y1="592" x2="788" y2="592" stroke="#2d1b69" stroke-width="1"/>

    <g transform="translate(56, 610)">
      <circle cx="8" cy="8" r="5" fill="#00ffa3"/>
      <text x="24" y="13" font-size="14" font-weight="500" fill="#ffffff">darkbloom</text>
      <text x="200" y="13" font-size="12" fill="#8888aa">openai-completions</text>
      <text x="500" y="13" font-size="12" fill="#00e5ff">darkbloom-2, darkbloom-1</text>
    </g>
    <line x1="56" y1="632" x2="788" y2="632" stroke="#2d1b69" stroke-width="1"/>

    <g transform="translate(56, 650)">
      <circle cx="8" cy="8" r="5" fill="#00ffa3"/>
      <text x="24" y="13" font-size="14" font-weight="500" fill="#ffffff">nvidia-nim</text>
      <text x="200" y="13" font-size="12" fill="#8888aa">openai-completions</text>
      <text x="500" y="13" font-size="12" fill="#00e5ff">nemotron, llama-3.1-nemotron, mistral-large-2</text>
