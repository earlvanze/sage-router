      <text x="200" y="13" font-size="12" fill="#8888aa">openai-codex-responses</text>
      <text x="500" y="13" font-size="12" fill="#00e5ff">gpt-5.5, gpt-5.4, gpt-5.3-codex, gpt-5.2-codex, gpt-5.1-codex-max</text>
    </g>
    <line x1="56" y1="392" x2="788" y2="392" stroke="#2d1b69" stroke-width="1"/>

    <g transform="translate(56, 410)">
      <circle cx="8" cy="8" r="5" fill="#00ffa3"/>
      <text x="24" y="13" font-size="14" font-weight="500" fill="#ffffff">openai</text>
      <text x="200" y="13" font-size="12" fill="#8888aa">openai-completions</text>
      <text x="500" y="13" font-size="12" fill="#00e5ff">gpt-5.5, gpt-5.4, gpt-5.4-pro, gpt-5.4-mini</text>
