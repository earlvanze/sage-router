      <circle cx="8" cy="8" r="5" fill="#00ffa3"/>
      <text x="24" y="13" font-size="14" font-weight="500" fill="#ffffff">anthropic</text>
      <text x="200" y="13" font-size="12" fill="#8888aa">anthropic-messages · Dario</text>
      <text x="500" y="13" font-size="12" fill="#00e5ff">claude-sonnet-4.5, claude-haiku-4.5, claude-opus-4.5</text>
    </g>
    <line x1="56" y1="472" x2="788" y2="472" stroke="#2d1b69" stroke-width="1"/>

    <g transform="translate(56, 490)">
      <circle cx="8" cy="8" r="5" fill="#00ffa3"/>
      <text x="24" y="13" font-size="14" font-weight="500" fill="#ffffff">google</text>
      <text x="200" y="13" font-size="12" fill="#8888aa">google-generative-language</text>
      <text x="500" y="13" font-size="12" fill="#00e5ff">gemini-3-flash-preview, gemini-2.5-pro, gemini-2.5-flash</text>
