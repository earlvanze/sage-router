<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
  </defs>

  <!-- App window background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1280" height="64" fill="#15182d"/>
  <circle cx="32" cy="32" r="6" fill="#ff5f57"/>
  <circle cx="56" cy="32" r="6" fill="#febc2e"/>
  <circle cx="80" cy="32" r="6" fill="#28c840"/>
  <rect x="120" y="20" width="800" height="24" rx="12" fill="#0a0e27"/>
  <text x="140" y="36" font-family="ui-monospace, monospace" font-size="12" fill="#7c4dff">https://sage-router.local/dashboard</text>

  <!-- Top bar -->
  <rect x="0" y="64" width="1280" height="60" fill="#0e1224" stroke="#2d1b69" stroke-width="1"/>
  <text x="32" y="100" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="#ffffff">Sage Router</text>
  <text x="220" y="100" font-family="ui-sans-serif, system-ui" font-size="14" fill="#7c4dff">v1.0.0</text>

  <!-- Health badge top right -->
  <rect x="1080" y="78" width="160" height="32" rx="16" fill="#0a3a1f" stroke="#00ffa3" stroke-width="1"/>
  <circle cx="1100" cy="94" r="5" fill="#00ffa3"/>
  <text x="1115" y="100" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="600" fill="#00ffa3">All providers healthy</text>

  <!-- Main grid -->
  <!-- Stat cards -->
  <g font-family="ui-sans-serif, system-ui">
    <rect x="32" y="148" width="280" height="120" rx="12" fill="#15182d" stroke="#2d1b69" stroke-width="1"/>
    <text x="56" y="184" font-size="13" fill="#8888aa">Total requests (24h)</text>
    <text x="56" y="226" font-size="32" font-weight="700" fill="#ffffff">12,847</text>
    <text x="56" y="252" font-size="12" fill="#00ffa3">+18% vs yesterday</text>

    <rect x="328" y="148" width="280" height="120" rx="12" fill="#15182d" stroke="#2d1b69" stroke-width="1"/>
    <text x="352" y="184" font-size="13" fill="#8888aa">Tokens served</text>
    <text x="352" y="226" font-size="32" font-weight="700" fill="#ffffff">47.2M</text>
    <text x="352" y="252" font-size="12" fill="#00e5ff">$327.40 routed</text>

    <rect x="624" y="148" width="280" height="120" rx="12" fill="#15182d" stroke="#2d1b69" stroke-width="1"/>
    <text x="648" y="184" font-size="13" fill="#8888aa">Active providers</text>
    <text x="648" y="226" font-size="32" font-weight="700" fill="#ffffff">10</text>
    <text x="648" y="252" font-size="12" fill="#ff4dff">3 frontier, 7 local</text>

    <rect x="920" y="148" width="328" height="120" rx="12" fill="#15182d" stroke="#2d1b69" stroke-width="1"/>
    <text x="944" y="184" font-size="13" fill="#8888aa">OpenClaw Codex OAuth</text>
    <text x="944" y="226" font-size="24" font-weight="700" fill="#00ffa3">Connected</text>
    <text x="944" y="252" font-size="12" fill="#8888aa">earlvanze@gmail.com · expires 23h</text>
