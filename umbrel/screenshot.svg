      <circle cx="8" cy="8" r="5" fill="#7c4dff"/>
      <text x="24" y="13" font-size="14" font-weight="500" fill="#ffffff">github-copilot</text>
      <text x="200" y="13" font-size="12" fill="#8888aa">openclaw-gateway</text>
      <text x="500" y="13" font-size="12" fill="#00e5ff">via OpenClaw gateway bridge</text>
    </g>
