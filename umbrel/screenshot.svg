  <!-- Right side: routing visualizer -->
  <g font-family="ui-sans-serif, system-ui">
    <rect x="828" y="288" width="420" height="480" rx="12" fill="#15182d" stroke="#2d1b69" stroke-width="1"/>
    <text x="852" y="324" font-size="16" font-weight="600" fill="#ffffff">Live routing</text>
    <text x="852" y="346" font-size="12" fill="#8888aa">Last 100 requests · intent → provider</text>

    <!-- Center hub -->
    <circle cx="1038" cy="560" r="48" fill="url(#accent)" opacity="0.9"/>
    <text x="1038" y="566" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>

    <!-- Surrounding nodes -->
    <circle cx="900" cy="420" r="22" fill="#0a0e27" stroke="#00e5ff" stroke-width="2"/>
    <text x="900" y="425" font-size="9" font-weight="600" fill="#00e5ff" text-anchor="middle">code</text>
    <line x1="918" y1="432" x2="1006" y2="540" stroke="#00e5ff" stroke-width="1" opacity="0.6"/>

    <circle cx="1180" cy="420" r="22" fill="#0a0e27" stroke="#7c4dff" stroke-width="2"/>
    <text x="1180" y="425" font-size="9" font-weight="600" fill="#7c4dff" text-anchor="middle">frontier</text>
    <line x1="1158" y1="432" x2="1070" y2="540" stroke="#7c4dff" stroke-width="1" opacity="0.6"/>

    <circle cx="900" cy="700" r="22" fill="#0a0e27" stroke="#ff4dff" stroke-width="2"/>
    <text x="900" y="705" font-size="9" font-weight="600" fill="#ff4dff" text-anchor="middle">eco</text>
    <line x1="918" y1="688" x2="1006" y2="580" stroke="#ff4dff" stroke-width="1" opacity="0.6"/>

    <circle cx="1180" cy="700" r="22" fill="#0a0e27" stroke="#00ffa3" stroke-width="2"/>
    <text x="1180" y="705" font-size="9" font-weight="600" fill="#00ffa3" text-anchor="middle">local</text>
    <line x1="1158" y1="688" x2="1070" y2="580" stroke="#00ffa3" stroke-width="1" opacity="0.6"/>

    <text x="900" y="395" font-size="9" fill="#8888aa" text-anchor="middle">38%</text>
    <text x="1180" y="395" font-size="9" fill="#8888aa" text-anchor="middle">27%</text>
    <text x="900" y="745" font-size="9" fill="#8888aa" text-anchor="middle">22%</text>
    <text x="1180" y="745" font-size="9" fill="#8888aa" text-anchor="middle">13%</text>
  </g>
