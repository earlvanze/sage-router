<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#e040fb"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect x="8" y="8" width="496" height="496" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow)" stroke-width="12" opacity="0.6"/>
  <!-- Inner hexagonal routing symbol -->
  <polygon points="256,100 376,178 376,334 256,412 136,334 136,178" fill="none" stroke="url(#inner)" stroke-width="16" stroke-linejoin="round" opacity="0.9"/>
  <!-- Center node -->
  <circle cx="256" cy="256" r="36" fill="url(#inner)" opacity="0.95"/>
  <!-- Routing paths from center to vertices -->
  <line x1="256" y1="256" x2="256" y2="110" stroke="url(#glow)" stroke-width="6" opacity="0.7"/>
  <line x1="256" y1="256" x2="370" y2="184" stroke="url(#glow)" stroke-width="6" opacity="0.7"/>
  <line x1="256" y1="256" x2="370" y2="328" stroke="url(#glow)" stroke-width="6" opacity="0.7"/>
  <line x1="256" y1="256" x2="256" y2="402" stroke="url(#glow)" stroke-width="6" opacity="0.7"/>
  <line x1="256" y1="256" x2="142" y2="328" stroke="url(#glow)" stroke-width="6" opacity="0.7"/>
  <line x1="256" y1="256" x2="142" y2="184" stroke="url(#glow)" stroke-width="6" opacity="0.7"/>
  <!-- Vertex nodes (provider endpoints) -->
  <circle cx="256" cy="100" r="18" fill="#00e5ff" opacity="0.9"/>
  <circle cx="376" cy="178" r="18" fill="#7c4dff" opacity="0.9"/>
  <circle cx="376" cy="334" r="18" fill="#e040fb" opacity="0.9"/>
  <circle cx="256" cy="412" r="18" fill="#7c4dff" opacity="0.9"/>
  <circle cx="136" cy="334" r="18" fill="#00e5ff" opacity="0.9"/>
  <circle cx="136" cy="178" r="18" fill="#e040fb" opacity="0.9"/>
  <!-- "S" letter in center -->
  <text x="256" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">S</text>
</svg>
