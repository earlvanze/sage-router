version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: sage-router_app_1
      APP_PORT: 8790

  app:
    image: ghcr.io/earlvanze/sage-router-public:v3.28.11@sha256:8beb14de0d9fed7e89702b4eb9b2ac9e29c63335d5017578defd17e63bcbf637
    restart: on-failure
    user: "1000:1000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${APP_DATA_DIR}/data:/config
    environment:
      PORT: "8790"
      APP_DATA_DIR: /config
      SAGE_ROUTER_HOME: /config
      SAGE_ROUTER_CONFIG_SOURCE: auto
      SAGE_ROUTER_API_KEY: ${APP_SAGE_ROUTER_API_KEY:-local}
      SAGE_ROUTER_DISABLED_PROVIDERS: >-
        ollama-cloud,anthropic,dario,openrouter,nvidia-nim,darkbloom,ollama-cyber,google,google-vertex
      SAGE_ROUTER_DISABLED_MODELS: kimi-k2-thinking
      SAGE_ROUTER_PROFILE_OVERLAYS: ""
      SAGE_ROUTER_OLLAMA_TIMEOUT_SECONDS: "300"
      SAGE_ROUTER_BUNDLED_OLLAMA_AUTOSTART: "0"
      SAGE_ROUTER_OLLAMA_CLOUD_CATALOG_ENABLED: "0"
      SAGE_ROUTER_OLLAMA_AUTO_PULL_PATTERNS: ""
      OLLAMA_HOST: $APP_OLLAMA_URL
      SAGE_ROUTER_OLLAMA_BASE_URL: $APP_OLLAMA_URL
      OPENAI_CODEX_API_KEY: ${APP_SAGE_ROUTER_OPENAI_CODEX_API_KEY:-}
      SAGE_ROUTER_OPENAI_CODEX_AUTH_PROFILE_PATH: /config/agents/main/agent/auth-profiles.json
      SAGE_ROUTER_SHOW_MODEL_PREFIX: "0"
      SAGE_ROUTER_ALLOW_RESTART: "1"
