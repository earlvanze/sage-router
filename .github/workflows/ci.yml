name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Python syntax check
        run: python -m py_compile router.py

      - name: Node syntax check
        run: |
          node --check openclaw_gateway_agent.mjs
          find web/public -maxdepth 1 -name '*.js' -print -exec node --check {} \;

      - name: Shell syntax check
        run: for file in scripts/*.sh; do bash -n "$file"; done

      - name: Docker build check
        run: docker build -t sage-router:ci .
