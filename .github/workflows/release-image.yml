name: Release image

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v3.28.0)'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            # Use the tag from the workflow_dispatch input, default to 'latest'
            INPUT_TAG="${{ github.event.inputs.tag }}"
            if [[ -z "$INPUT_TAG" ]]; then
              INPUT_TAG="latest"
            fi
            echo "value=${INPUT_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/earlvanze/sage-router:${{ steps.tag.outputs.value }}
          provenance: false
